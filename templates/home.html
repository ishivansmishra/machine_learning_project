<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Performance Predictor</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 24px;
            font-weight: bold;
        }

        .btn-primary {
            width: 100%;
            border-radius: 10px;
        }

        .result-box {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card p-4">
        
        <h1 class="text-center mb-4">📊 Student Exam Performance Predictor</h1>

        <form action="{{ url_for('predict_datapoint') }}" method="post">

            <!-- Gender -->
            <div class="mb-3">
                <label class="form-label">Gender</label>
                <select class="form-select" name="gender" required>
                    <option disabled selected>Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <!-- Ethnicity -->
            <div class="mb-3">
                <label class="form-label">Race / Ethnicity</label>
                <select class="form-select" name="ethnicity" required>
                    <option disabled selected>Select Ethnicity</option>
                    <option value="group A">Group A</option>
                    <option value="group B">Group B</option>
                    <option value="group C">Group C</option>
                    <option value="group D">Group D</option>
                    <option value="group E">Group E</option>
                </select>
            </div>

            <!-- Parent Education -->
            <div class="mb-3">
                <label class="form-label">Parental Education</label>
                <select class="form-select" name="parental_level_of_education" required>
                    <option disabled selected>Select Education</option>
                    <option value="associate's degree">Associate's degree</option>
                    <option value="bachelor's degree">Bachelor's degree</option>
                    <option value="high school">High school</option>
                    <option value="master's degree">Master's degree</option>
                    <option value="some college">Some college</option>
                    <option value="some high school">Some high school</option>
                </select>
            </div>

            <!-- Lunch -->
            <div class="mb-3">
                <label class="form-label">Lunch Type</label>
                <select class="form-select" name="lunch" required>
                    <option disabled selected>Select Lunch</option>
                    <option value="free/reduced">Free/Reduced</option>
                    <option value="standard">Standard</option>
                </select>
            </div>

            <!-- Test Prep -->
            <div class="mb-3">
                <label class="form-label">Test Preparation</label>
                <select class="form-select" name="test_preparation_course" required>
                    <option disabled selected>Select Course</option>
                    <option value="none">None</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <!-- Scores -->
            <div class="mb-3">
                <label class="form-label">Reading Score</label>
                <input type="number" class="form-control" name="reading_score" min="0" max="100" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Writing Score</label>
                <input type="number" class="form-control" name="writing_score" min="0" max="100" required>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary">🎯 Predict Maths Score</button>

        </form>

        <!-- Error -->
        {% if error_message %}
        <div class="alert alert-danger mt-3" role="alert">
            {{ error_message }}
        </div>
        {% endif %}

        <!-- Result -->
        {% if results is not none %}
        <div class="result-box">
            <h5>Predicted Maths Score:</h5>
            <h3 class="text-success">{{ results }}</h3>
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
